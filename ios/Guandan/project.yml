name: Guandan
options:
  bundleIdPrefix: dev.guandan
  deploymentTarget:
    iOS: "17.0"
packages:
  GuandanCore:
    path: ../GuandanCore
targets:
  Guandan:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: GuandanCore
    info:
      path: Sources/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - IosevkaNerdFont-Bold.ttf
        CFBundleDisplayName: Guan Dan
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.guandan.ios
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: XJLK6U3958
        SWIFT_VERSION: "5"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
